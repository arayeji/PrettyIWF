# iwf.conf - sample configuration for the GTPv1-C <-> GTPv2-C IWF.
#
# Replace the 10.234.241.x placeholders with the addresses used in your
# deployment. The IWF is signaling-only; GTP-U flows directly between the
# RNC and UPG-VPP SGW-U via Direct Tunnel.

[iwf]
# UDP bind address. Use your Gn/S4-facing IPv4 here if only one interface
# carries GTP-C. If you set listen_ip = 0.0.0.0 and set local_ip below, the
# IWF binds UDP only on local_ip (so another stack can use 0.0.0.0:2123 on a
# different address on the same host). To force bind on 0.0.0.0 anyway, start
# with:  IWF_LISTEN_ON_ANY=1  in the environment.
listen_ip   = 0.0.0.0
listen_port = 2123

# IPv4 sent in GTP F-TEID / GSN Address IEs (Gn + S4). Required when listen_ip
# is 0.0.0.0 (unless listen_ip is a concrete address, then it may match that).
local_ip    = 10.234.241.10

# Lab: GTPv2 cause 103 if SGW expects ULI but Gn omits RAI (e.g. sgsnemu).
# When 1, ULI is built from IMSI MCC/MNC + LAC=RAC=0. Not for production.
# synthetic_uli_no_rai = 1

# RAT Type advertised in GTPv2 Create Session / Modify Bearer Request.
# eutran (6) | utran (1) | geran (2) | wlan (3). Open5GS SMF rejects anything
# other than EUTRAN or WLAN with "Unknown RAT Type" -> GTP cause 70.
# The IWF-translator side is independent of the actual radio; default works
# against vanilla Open5GS even when the real radio is UTRAN.
rat_type    = eutran

[sgsn]
# osmo-sgsn Gn GTP-C address: outbound GTPv1-C (e.g. SGSN Context Request) is
# sent here. Incoming GTPv1 is accepted from any source.
ip          = 10.234.241.21
port        = 2123

[mme]
# Used when osmo originates a GTPv1 SGSN Context Request toward the IWF: the
# IWF relays GTPv2 Context Request here and awaits Context Response back.
ip          = 10.234.241.42
port        = 2123

[sgwc]
# Open5GS SGW-C control-plane endpoint.
ip          = 10.234.241.30
port        = 2123

[smf]
# SMF / PGW-C GTP-C (S5/S8). Open5GS SGW-C requires this F-TEID in Create Session
# Request. Use the SMF GTP-C IPv4 from smf.yaml.
#
# teid MUST be 0 for an initial Create Session Request — SMF allocates its own
# S5/S8-C TEID and returns it in Create Session Response. Any non-zero value
# makes SMF log "No Session" (it tries to look up an existing session by that
# TEID), and SGW-C then rejects the whole attach with GTPv2 cause 103.
ip          = 10.234.241.9
teid        = 0

[logging]
# level: error | warn | info | debug | trace   (trace = with hex dumps)
level       = info
# "-" or empty -> stderr.  Otherwise an absolute path.
file        = /var/log/iwf.log

# =============================================================================
# MAP <-> Diameter S6d IWF (optional)
# -----------------------------------------------------------------------------
# Enable only if you want to terminate inbound MAP/Gr (SS7) from roaming SGSNs
# and translate to Diameter S6d toward PyHSS.  Requires:
#   * libosmo-sigtran + libosmo-sccp + libosmocore on the host
#   * Rebuild with: make MAP_IWF_ENABLED=1
#   * osmo-stp configured as the SCCP/M3UA front-end (see [stp] below)
# Leave [map_iwf].enabled = 0 to run as the GTP-only IWF (original behaviour).
# =============================================================================

[map_iwf]
# Must be 1 for /tmp/iwf_cmd.sock (socat test commands) — the listener is set
# up only after MAP-IWF (Diameter S6d + stack) finishes initializing.
enabled       = 0
# Local Global Title (E.164 digits, no '+').  Used as the SCCP CallingParty
# Global Title for outbound MAP messages toward the foreign SGSN.
local_gt      = 98921000000
# Local SS7 point code in ITU 3-8-3 dotted form.
local_pc      = 1.2.3
# Subsystem number.  149 = SGSN (3GPP TS 23.003 §5.1).
local_ssn     = 149
# TCAP dialogue T-timeout: maximum lifetime of a transaction before we
# tear it down with MAP Abort + SystemFailure toward the SGSN.
t_dialogue_ms = 10000
# UNIX stream socket for "sai <IMSI>" tests (default /tmp/iwf_cmd.sock).
# Under systemd with PrivateTmp=yes the process /tmp is not the host /tmp — use e.g.
#   cmd_sock = /run/iwf/iwf_cmd.sock
# and create the directory (systemd RuntimeDirectory=iwf) or let iwf mkdir /run/iwf.
# cmd_sock      = /tmp/iwf_cmd.sock

[stp]
# IWF is an M3UA/SCTP *client*: it connects to ip:port below. The *local*
# SCTP port is ephemeral (kernel-assigned) unless you set local_port.
# On osmo-stp, a static ASP must *not* expect the peer at 10.x.x.x:2905 —
# 2905 is the STP listen port; the client uses a high source port (see
# "show cs7 instance 0 asp" dynamic rows). Match peer by IP only / use
# passive/dynamic ASP as per Osmocom STP docs.
# Optional bind for SCTP:
# local_ip    = 10.234.241.10
# local_port  = 0
# osmo-stp SCTP transport.  M3UA ASP-UP/ACTIVE happens automatically once
# the SCTP association is established.
ip            = 127.0.0.1
port          = 2905
# Point code reachable through this STP (typically the STP itself); the
# STP forwards by GT/PC to the eventual SGSN over GRX.
remote_pc     = 1.2.1
# M3UA routing context (RKM). Must be unique per ASP on one STP — default 1
# (osmo-sgsn often uses 3). Use 0 for dynamic SG allocation (ROUTE_CTX omitted).
# routing_context = 1

[diameter_s6d]
# PyHSS Diameter peer.
peer_ip       = 10.234.241.50
peer_port     = 3868
# Diameter identity advertised in CER/AIR/ULR/etc.  Must be FQDN-shaped per
# RFC 6733 §3 - PyHSS will reject malformed values with Result-Code 3010.
origin_host   = iwf.mnc012.mcc432.3gppnetwork.org
origin_realm  = mnc012.mcc432.3gppnetwork.org
dest_host     = pyhss.mnc012.mcc432.3gppnetwork.org
dest_realm    = mnc012.mcc432.3gppnetwork.org
product_name  = iwf
vendor_id     = 10415
# Watchdog (Tw): how often we send DWR when the peer is open (ms).
watchdog_ms   = 30000
# Per-request response timeout: if PyHSS doesn't answer an AIR/ULR/CLR/PUR
# within this window the dialogue dies with MAP SystemFailure.
request_timeout_ms = 10000

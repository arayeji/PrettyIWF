# iwf.conf — example configuration (copy to /etc/iwf/iwf.conf and edit).
# Signaling-only IWF; GTP-U stays on RNC ↔ SGW-U (Direct Tunnel).

[iwf]
listen_ip   = 0.0.0.0
listen_port = 2123
# Required when listen_ip is 0.0.0.0: IPv4 advertised in F-TEID / GSN Address IEs.
local_ip    = 10.0.0.5
# Lab: build ULI from IMSI PLMN when Gn Create-PDP omits RAI (sgsnemu).
# synthetic_uli_no_rai = 1
# eutran (6) | utran (1) | geran (2) | wlan (3) — Open5GS SMF accepts 6/3.
rat_type    = eutran

[sgsn]
ip          = 10.0.0.20
port        = 2123

[mme]
ip          = 10.0.0.42
port        = 2123

[sgwc]
ip          = 10.0.0.30
port        = 2123

[smf]
# PGW-C / SMF GTP-C (S5/S8). teid must be 0 for initial Create Session.
ip          = 10.0.0.9
teid        = 0

[logging]
level       = info
file        = -

# --- Optional: MAP ↔ Diameter (make MAP_IWF_ENABLED=1) -----------------------

[map_iwf]
enabled       = 0
# E.164 VLR Global Title (digits only). Used for MAP and, on GSUP CS ULR,
# encoded as Diameter SGSN-Number so Pretty5GS HSS stores vlr_number for Sh/T-ADS.
local_gt      = 1234567890
local_pc      = 1.2.3
local_ssn     = 149
t_dialogue_ms = 10000

[stp]
local_ip          = 10.0.0.5
ip                = 10.0.0.21
port              = 2905
remote_pc         = 1.2.3
routing_context   = 1
network_indicator = reserved

[diameter_s6d]
peer_ip       = 10.0.0.50
peer_port     = 3868
origin_host   = iwf.epc.mnc001.mcc001.3gppnetwork.org
# Required for CS: separate Diameter identity (stored as HSS vlr_host) vs PS MME.
# Must match the Origin-Host HSS expects for CS IDR/CLR/PUR toward IWF.
# origin_host_cs = iwf-vlr.epc.mnc001.mcc001.3gppnetwork.org
origin_realm  = mnc001.mcc001.3gppnetwork.org
dest_host     = hss.epc.mnc001.mcc001.3gppnetwork.org
dest_realm    = mnc001.mcc001.3gppnetwork.org
product_name  = iwf
vendor_id     = 10415
watchdog_ms   = 30000
request_timeout_ms = 10000

# --- Optional: GSUP proxy (osmo-sgsn / osmo-msc → Open5GS HSS) ---------------

[gsup_server]
enabled     = 0
listen_ips  = 10.0.0.5
listen_port = 4222
local_mnc   = 001
timeout_ms  = 10000

[roaming_hlr]
# Example: route IMSI prefix MCC+MNC to foreign HLR GT via STP.
# mnc999_hlr_gt  = 1234567890123
# mnc999_ssn     = 6
# mnc999_src_ip  = 10.0.0.5
# mnc999_src_gt  = 1234567890

# --- Optional: MAP SMS (make SMS_IWF_ENABLED=1) ------------------------------

[sms_iwf]
enabled           = 0
hlr_ssn           = 6
local_msc_gt      = 1234567890000
local_smsc_gt     = 1234567890006
gsup_timeout_ms   = 3000
sri_sm_timeout_ms = 5000
fwdsm_timeout_ms  = 10000

[gsup_client]
remote_ip         = 127.0.0.1
remote_port       = 4222
client_name       = IWF-SMS

[smpp_server]
bind_ip           = 127.0.0.1
port              = 2777
system_id         = iwf
password          = changeme

[partner.example]
hlr_gt            = FILL_IN_PARTNER_HLR_GT
msisdn_prefixes   = 12345,12346
